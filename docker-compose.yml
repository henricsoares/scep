services:
  backend:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://scep:scep@postgres:5432/scep
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports: ["8000:8000"]
    depends_on: [postgres, otel-collector]
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports: ["5173:80"]
    depends_on: [backend]
  simulation-engine:
    build: ./simulation-engine
    environment:
      BACKEND_URL: http://backend:8000
    depends_on: [backend]
    restart: on-failure
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scep
      POSTGRES_PASSWORD: scep
      POSTGRES_DB: scep
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes: ["./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana:11.3.1
    volumes: ["./docker/grafana/provisioning:/etc/grafana/provisioning:ro"]
    ports: ["3000:3000"]
  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/config.yml"]
    volumes: ["./docker/loki/config.yml:/etc/loki/config.yml:ro"]
    ports: ["3100:3100"]
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes: ["./docker/tempo/tempo.yml:/etc/tempo.yml:ro"]
    ports: ["3200:3200", "4318:4318"]
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes: ["./docker/otel-collector/config.yml:/etc/otelcol/config.yml:ro"]
    ports: ["4317:4317", "8889:8889"]
volumes:
  postgres-data:
